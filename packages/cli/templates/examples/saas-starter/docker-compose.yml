version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kanji-saas-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kanji_saas_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_saas_data:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-test:
    image: postgres:16-alpine
    container_name: kanji-saas-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kanji_saas_test
    ports:
      - '5433:5432'
    restart: unless-stopped

volumes:
  postgres_saas_data:
